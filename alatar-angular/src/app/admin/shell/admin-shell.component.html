<div class="admin-shell" [attr.data-sidebar-state]="sidebarState()" [attr.data-breakpoint]="breakpoint()">
  <app-admin-topbar
    class="admin-shell__topbar"
    (toggleSidebar)="toggleSidebar()"
  ></app-admin-topbar>

  <app-admin-sidebar
    class="admin-shell__sidebar"
    [state]="sidebarState()"
    (navigate)="closeDrawer()"
  ></app-admin-sidebar>

  @if (showsBackdrop()) {
    <button
      type="button"
      class="admin-shell__backdrop"
      [attr.aria-label]="'common.aria.close_menu' | transloco"
      (click)="closeDrawer()"
    ></button>
  }

  <main class="admin-shell__main">
    <router-outlet></router-outlet>
  </main>

  <admin-toast-host></admin-toast-host>
</div>
